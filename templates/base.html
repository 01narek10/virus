    <style>
        /* ===== CHATBOT STYLES ===== */
        .chatbot-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chatbot-button {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(44, 195, 255, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .chatbot-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(44, 195, 255, 0.9);
        }

        .chatbot-window {
            background: #0a192f;
            border: 2px solid #2cc3ff;
            border-radius: 24px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            resize: both;
            overflow: auto;
            min-width: 300px;
            min-height: 400px;
            max-width: 800px;
            max-height: 800px;
        }

        .chatbot-window.show {
            display: flex;
        }

        .chatbot-header {
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            color: #0a192f;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .chatbot-header button {
            background: rgba(0,0,0,0.2);
            border: none;
            color: #0a192f;
            font-size: 1.5rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .chatbot-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0a192f;
        }

        .message {
            display: flex;
        }
        .message.bot { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            color: white;
        }

        .message.bot .message-content {
            background: #1e3a6b;
            border: 1px solid #2cc3ff;
            border-bottom-left-radius: 5px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            color: #0a192f;
            border-bottom-right-radius: 5px;
        }

        .chatbot-input {
            display: flex;
            padding: 12px;
            background: #0a192f;
            border-top: 1px solid #2cc3ff;
            gap: 8px;
        }

        .chatbot-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #2cc3ff;
            border-radius: 40px;
            background: #1e2f4a;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .chatbot-input button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            border: none;
            color: #0a192f;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Desktop */
        @media (min-width: 1025px) {
            .chatbot-window {
                width: 520px;
                height: 680px;
                position: absolute;
                bottom: 80px;
                right: 0;
            }
            .chatbot-button {
                width: 80px;
                height: 80px;
                font-size: 2.8rem;
            }
        }

        /* Mobile */
        @media (max-width: 1024px) {
            .chatbot-window {
                width: 85vw;
                height: 70vh;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                resize: both;
                min-width: 280px;
                min-height: 400px;
                max-width: 95vw;
                max-height: 85vh;
            }
            .chatbot-button {
                width: 65px;
                height: 65px;
                font-size: 2.2rem;
                bottom: 20px;
                right: 20px;
                position: fixed;
            }
        }

        /* Language Selector */
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            gap: 5px;
            background: rgba(10, 25, 47, 0.9);
            padding: 8px 12px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid #2cc3ff;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: rgba(44, 195, 255, 0.2);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            color: #0a192f;
            font-weight: bold;

<body>

                <li class="nav-item"><a class="nav-link" href="/simulator">{{ t.simulator }}</a></li>

            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- CHATBOT -->
<div class="chatbot-container">
    <div class="chatbot-button" onclick="toggleChat()">💬</div>
    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header" id="chatbotHeader">
            <span id="chatbotTitle">{{ t.chatbot_title }}</span>
            <button onclick="toggleChat()">&times;</button>
        </div>
        <div class="chatbot-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content" id="welcomeMessage">{{ t.chatbot_welcome }}</div>
            </div>
        </div>
        <div class="chatbot-input">
            <input type="text" id="userInput" placeholder="{{ t.chatbot_placeholder }}" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <div class="footer-content">
        <p>{{ t.footer }}</p>
        <p>{{ t.footer_update }}</p>
    </div>
</footer>

<script>
// ===== CHATBOT =====
function toggleChat() {
    var win = document.getElementById('chatbotWindow');
    if (win.style.display === 'flex') {
        win.style.display = 'none';
    } else {
        win.style.display = 'flex';
    }
}

function addMessage(text, sender) {
    var container = document.getElementById('chatMessages');
    var div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerHTML = '<div class="message-content">' + text + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addThinking() {
    var container = document.getElementById('chatMessages');
    var div = document.createElement('div');
    div.className = 'message bot thinking';
    div.id = 'thinking-' + Date.now();
    var lang = '{{ lang }}';
    var thinkingText = lang === 'hy' ? '⏳ Մտածում եմ...' : (lang === 'ru' ? '⏳ Думаю...' : '⏳ Thinking...');
    div.innerHTML = '<div class="message-content">' + thinkingText + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.id;
}

function removeThinking(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

function sendMessage() {
    var input = document.getElementById('userInput');
    var message = input.value.trim();
    if (!message) return;
    
    addMessage(message, 'user');
    input.value = '';
    
    var thinkingId = addThinking();
    var lang = '{{ lang }}';
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message, language: lang })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        removeThinking(thinkingId);
        addMessage(data.reply, 'bot');
    })
    .catch(function(error) {
        removeThinking(thinkingId);
        var errorText = lang === 'hy' ? '❌ Ցանցային սխալ' : (lang === 'ru' ? '❌ Ошибка сети' : '❌ Network error');
        addMessage(errorText, 'bot');
    });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
