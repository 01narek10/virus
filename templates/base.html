<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta name="google-site-verification" content="Zj0hJ-4cJB2uGESTPj3qNoUEzFcaVQ1s0pW1AUOwbhI" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=1.5, user-scalable=yes">
    <title>{% block title %}Վիրուսների հանրագիտարան 2026{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
    <style>
/* CHATBOT */
.chatbot-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: white;
    cursor: pointer;
    z-index: 10001;
    box-shadow: 0 4px 20px rgba(44,195,255,0.5);
    transition: transform 0.3s;
}

.chatbot-button:hover {
    transform: scale(1.1);
}

.chatbot-window {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 450px;
    height: 550px;
    background: #0a192f;
    border: 2px solid #2cc3ff;
    border-radius: 24px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 10000;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.chatbot-window.show {
    display: flex;
}

/* Mobile */
@media (max-width: 768px) {
    .chatbot-window {
        width: 90vw;
        height: 70vh;
        top: 50%;
        left: 50%;
        bottom: auto;
        right: auto;
        transform: translate(-50%, -50%);
    }
    .chatbot-button {
        bottom: 15px;
        right: 15px;
        width: 60px;
        height: 60px;
        font-size: 1.8rem;
    }
}

        /* Language Selector */
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            gap: 5px;
            background: rgba(10, 25, 47, 0.9);
            padding: 8px 12px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid #2cc3ff;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: rgba(44, 195, 255, 0.2);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
            color: #0a192f;
            font-weight: bold;

    
        }
        .chatbot-window {
            background: #0a192f;
            border: 2px solid #2cc3ff;
            border-radius: 24px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            resize: both;              /* <--- սա է resize-ը */
            overflow: auto;            /* resize-ի համար պարտադիր */
            min-width: 300px;
            min-height: 400px;
            max-width: 800px;
            max-height: 800px;
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 450px;
            height: 550px;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<div class="virus-background">
    <div class="virus"></div><div class="virus"></div><div class="virus"></div>
    <div class="virus"></div><div class="virus"></div><div class="virus"></div>
    <div class="virus"></div><div class="virus"></div><div class="virus"></div>
    <div class="virus"></div><div class="bacteriophage"></div><div class="bacteriophage"></div>
</div>
<div class="moving-grid"></div>
<div class="spotlight"></div>

<!-- LANGUAGE SELECTOR -->
<div class="language-selector">
    <a href="/set_language/hy" class="lang-btn {% if lang == 'hy' %}active{% endif %}">🇦🇲 Հայ</a>
    <a href="/set_language/ru" class="lang-btn {% if lang == 'ru' %}active{% endif %}">🇷🇺 Рус</a>
    <a href="/set_language/en" class="lang-btn {% if lang == 'en' %}active{% endif %}">🇬🇧 En</a>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">{{ t.home }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/map">{{ t.map }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/quiz">{{ t.quiz }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/leaderboard">{{ t.leaderboard }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/simulator">{{ t.simulator }}</a></li>
                <li class="nav-item"><a class="nav-link" href="/compare">{{ t.compare }}</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- CHATBOT -->
<div class="chatbot-button" onclick="toggleChat()">✉️</div>
<div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header" id="chatbotHeader">
        <span>{{ t.chatbot_title }}</span>
        <button onclick="toggleChat()">&times;</button>
    </div>
    <div class="chatbot-messages" id="chatMessages">
        <div class="message bot">
            <div class="message-content">{{ t.chatbot_welcome }}</div>
        </div>
    </div>
    <div class="chatbot-input">
        <input type="text" id="userInput" placeholder="{{ t.chatbot_placeholder }}" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <div class="footer-content">
        <p>{{ t.footer }}</p>
        <p>{{ t.footer_update }}</p>
    </div>
</footer>

<script>
   // ===== DRAGGABLE =====
let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;

function initDraggable() {
    if (window.innerWidth <= 768) return;
    const win = document.getElementById('chatbotWindow');
    const header = document.getElementById('chatbotHeader');
    if (!win || !header) return;

    header.style.cursor = 'move';
    header.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);

    function startDrag(e) {
        if (e.target.closest('button')) return;
        isDragging = true;
        const rect = win.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        win.style.position = 'fixed';
        win.style.top = rect.top + 'px';
        win.style.left = rect.left + 'px';
        win.style.right = 'auto';
        win.style.bottom = 'auto';
        e.preventDefault();
    }

    function onDrag(e) {
        if (!isDragging) return;
        let newX = e.clientX - dragOffsetX;
        let newY = e.clientY - dragOffsetY;
        newX = Math.min(Math.max(0, newX), window.innerWidth - win.offsetWidth);
        newY = Math.min(Math.max(0, newY), window.innerHeight - win.offsetHeight);
        win.style.left = newX + 'px';
        win.style.top = newY + 'px';
    }

    function stopDrag() {
        isDragging = false;
    }
}

window.addEventListener('load', initDraggable);
// ===== CHATBOT =====
function toggleChat() {
    var win = document.getElementById('chatbotWindow');
    if (win.style.display === 'flex') {
        win.style.display = 'none';
    } else {
        win.style.display = 'flex';
    }
}

function addMessage(text, sender) {
    var container = document.getElementById('chatMessages');
    var div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerHTML = '<div class="message-content">' + text + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function addThinking() {
    var container = document.getElementById('chatMessages');
    var div = document.createElement('div');
    div.className = 'message bot thinking';
    div.id = 'thinking-' + Date.now();
    var lang = '{{ lang }}';
    var thinkingText = lang === 'hy' ? '⏳ Մտածում եմ...' : (lang === 'ru' ? '⏳ Думаю...' : '⏳ Thinking...');
    div.innerHTML = '<div class="message-content">' + thinkingText + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.id;
}

function removeThinking(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

function initDraggable() {
    if (window.innerWidth > 768) {
        var win = document.getElementById('chatbotWindow');
        var header = document.getElementById('chatbotHeader');
        if (!win || !header) return;
        // ... drag logic
    }
}
    
function sendMessage() {
    var input = document.getElementById('userInput');
    var message = input.value.trim();
    if (!message) return;
    
    addMessage(message, 'user');
    input.value = '';
    
    var thinkingId = addThinking();
    var lang = '{{ lang }}';
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message, language: lang })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        removeThinking(thinkingId);
        addMessage(data.reply, 'bot');
    })
    .catch(function(error) {
        removeThinking(thinkingId);
        var errorText = lang === 'hy' ? '❌ Ցանցային սխալ' : (lang === 'ru' ? '❌ Ошибка сети' : '❌ Network error');
        addMessage(errorText, 'bot');
    });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
