{% extends "base.html" %}
{% block title %}{{ t.quiz_title }}{% endblock %}

{% block content %}
<div class="card" style="text-align: center;">
    <h2>{{ t.quiz_title }}</h2>
    <p>{{ t.quiz_desc }}</p>
    
    <div class="quiz-levels" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 40px 0;">
        <a href="/quiz/very_easy" class="quiz-level" style="background: linear-gradient(135deg, #28a745, #1e7e34); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(40,167,69,0.3); transition: all 0.3s;">{{ t.very_easy }}</a>
        <a href="/quiz/easy" class="quiz-level" style="background: linear-gradient(135deg, #17a2b8, #0f6674); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(23,162,184,0.3); transition: all 0.3s;">{{ t.easy }}</a>
        <a href="/quiz/medium" class="quiz-level" style="background: linear-gradient(135deg, #ffc107, #b27a00); color: #0a192f; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(255,193,7,0.3); transition: all 0.3s;">{{ t.medium }}</a>
        <a href="/quiz/hard" class="quiz-level" style="background: linear-gradient(135deg, #fd7e14, #c45c00); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(253,126,20,0.3); transition: all 0.3s;">{{ t.hard }}</a>
        <a href="/quiz/very_hard" class="quiz-level" style="background: linear-gradient(135deg, #dc3545, #a71d2a); color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(220,53,69,0.3); transition: all 0.3s;">{{ t.very_hard }}</a>
    </div>
</div>

<style>
.quiz-level:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(44,195,255,0.5);
}
</style>
{% endblock %}
