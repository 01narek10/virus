{% extends "base.html" %}
{% block title %}{{ t.simulator_title }}{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ t.simulator_title }}</h2>
    <p>{{ t.simulator_desc }}</p>

    <div class="simulator-container" style="padding: 20px; background: rgba(6,20,45,0.8); border-radius: 20px; margin-top: 20px;">
        
        <!-- КНОПКИ УПРАВЛЕНИЯ -->
        <div class="simulator-controls" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px;">
            <div class="control-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #2cc3ff; font-weight: 600;">{{ t.infection_rate }}</label>
                <input type="range" id="speed" min="0.1" max="0.9" step="0.1" value="0.3" style="width: 100%;">
            </div>
            <div class="control-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #2cc3ff; font-weight: 600;">{{ t.mortality_rate }}</label>
                <input type="range" id="mortality" min="0" max="30" step="1" value="10" style="width: 100%;">
            </div>
            <div class="control-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #2cc3ff; font-weight: 600;">{{ t.vaccinated }}</label>
                <input type="range" id="vaccinated" min="0" max="100" step="5" value="20" style="width: 100%;">
            </div>
            <div class="control-group" style="display: flex; flex-direction: column; gap: 8px;">
                <label style="color: #2cc3ff; font-weight: 600;">{{ t.initial_infected }}</label>
                <input type="number" id="initial" min="1" max="20" value="3" style="background: rgba(255,255,255,0.1); border: 2px solid #2cc3ff; border-radius: 10px; padding: 8px; color: white;">
            </div>
        </div>

        <!-- КАРАНТИН -->
        <div style="margin-bottom: 20px; text-align: center;">
            <label style="color: #2cc3ff; font-weight: 600; margin-right: 15px;">
                <input type="checkbox" id="quarantine" style="margin-right: 8px; transform: scale(1.2);"> {{ t.quarantine }}
            </label>
        </div>

        <!-- ХОЛСТ -->
        <canvas id="simulatorCanvas" width="400" height="400" style="display: block; margin: 20px auto; background: #0a192f; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></canvas>

        <!-- ГРАФИК -->
        <canvas id="infectionChart" width="400" height="200" style="margin: 20px auto; display: block;"></canvas>

        <!-- СТАТИСТИКА -->
        <div class="simulator-stats" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin: 20px 0; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px;">
            <div class="stat-item" style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div style="width: 20px; height: 20px; background: #2ecc71; border-radius: 5px; box-shadow: 0 0 15px #2ecc71;"></div>
                <span>{{ t.healthy }}</span>
                <span id="healthyCount" style="font-size: 1.5rem; font-weight: 700; color: white;">0</span>
            </div>
            <div class="stat-item" style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div style="width: 20px; height: 20px; background: #e74c3c; border-radius: 5px; box-shadow: 0 0 15px #e74c3c;"></div>
                <span>{{ t.infected }}</span>
                <span id="infectedCount" style="font-size: 1.5rem; font-weight: 700; color: white;">0</span>
            </div>
            <div class="stat-item" style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div style="width: 20px; height: 20px; background: #f1c40f; border-radius: 5px; box-shadow: 0 0 15px #f1c40f;"></div>
                <span>{{ t.recovered }}</span>
                <span id="recoveredCount" style="font-size: 1.5rem; font-weight: 700; color: white;">0</span>
            </div>
            <div class="stat-item" style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div style="width: 20px; height: 20px; background: #2c3e50; border-radius: 5px; box-shadow: 0 0 15px #2c3e50;"></div>
                <span>{{ t.dead }}</span>
                <span id="deadCount" style="font-size: 1.5rem; font-weight: 700; color: white;">0</span>
            </div>
        </div>

        <!-- КНОПКИ -->
        <div class="simulator-buttons" style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
            <button onclick="startSimulation()" class="btn-primary" style="background: linear-gradient(135deg, #2cc3ff, #1a9fd0); color: #0b1d3a; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;"> {{ t.start }}</button>
            <button onclick="stopSimulation()" class="btn-warning" style="background: linear-gradient(135deg, #ffc107, #b27a00); color: #0b1d3a; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;"> {{ t.stop }}</button>
            <button onclick="resetSimulation()" class="btn-secondary" style="background: rgba(255,255,255,0.1); color: white; padding: 12px 30px; border: 1px solid #2cc3ff; border-radius: 50px; cursor: pointer;">🔄 {{ t.reset }}</button>
            <button onclick="exportCSV()" class="btn-secondary" style="background: rgba(255,255,255,0.1); color: white; padding: 12px 30px; border: 1px solid #2cc3ff; border-radius: 50px; cursor: pointer;">📊 {{ t.csv_export }}</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// ==================== CONFIG ====================
const canvas = document.getElementById('simulatorCanvas');
const ctx = canvas.getContext('2d');
const cellSize = 20;
const cols = 20;
const rows = 20;
let grid = [];
let simulationInterval = null;
let isRunning = false;

let historyData = [];

// ==================== COLORS & STATES ====================
const COLORS = { HEALTHY: '#2ecc71', INFECTED: '#e74c3c', RECOVERED: '#f1c40f', DEAD: '#2c3e50' };
const STATES = { HEALTHY: 0, INFECTED: 1, RECOVERED: 2, DEAD: 3 };

// ==================== CHART ====================
let chart;
function initChart() {
    const lang = '{{ lang }}';
    let healthyLabel, infectedLabel, recoveredLabel, deadLabel;
    if (lang === 'hy') {
        healthyLabel = 'Առողջ';
        infectedLabel = 'Վարակված';
        recoveredLabel = 'Ապաքինված';
        deadLabel = 'Մահացած';
    } else if (lang === 'ru') {
        healthyLabel = 'Здоровые';
        infectedLabel = 'Зараженные';
        recoveredLabel = 'Выздоровевшие';
        deadLabel = 'Умершие';
    } else {
        healthyLabel = 'Healthy';
        infectedLabel = 'Infected';
        recoveredLabel = 'Recovered';
        deadLabel = 'Dead';
    }
    
    const ctxChart = document.getElementById('infectionChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctxChart, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: healthyLabel, data: [], borderColor: '#2ecc71', backgroundColor: 'rgba(46,204,113,0.1)', fill: true, tension: 0.3 },
                { label: infectedLabel, data: [], borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', fill: true, tension: 0.3 },
                { label: recoveredLabel, data: [], borderColor: '#f1c40f', backgroundColor: 'rgba(241,196,15,0.1)', fill: true, tension: 0.3 },
                { label: deadLabel, data: [], borderColor: '#2c3e50', backgroundColor: 'rgba(44,62,80,0.1)', fill: true, tension: 0.3 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
    });
}

function updateChart(healthy, infected, recovered, dead) {
    if (!chart) initChart();
    const step = chart.data.labels.length + 1;
    chart.data.labels.push(step);
    chart.data.datasets[0].data.push(healthy);
    chart.data.datasets[1].data.push(infected);
    chart.data.datasets[2].data.push(recovered);
    chart.data.datasets[3].data.push(dead);
    if (chart.data.labels.length > 50) {
        chart.data.labels.shift();
        chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();
}

// ==================== INIT GRID (БЕЗ ВЫЗДОРОВЕВШИХ) ====================
function initGrid() {
    grid = [];
    for (let i = 0; i < rows; i++) {
        grid[i] = [];
        for (let j = 0; j < cols; j++) {
            grid[i][j] = STATES.HEALTHY;
        }
    }
    const initialInfected = parseInt(document.getElementById('initial').value) || 3;
    for (let n = 0; n < initialInfected; n++) {
        const i = Math.floor(Math.random() * rows);
        const j = Math.floor(Math.random() * cols);
        grid[i][j] = STATES.INFECTED;
    }
    // ВАКЦИНАЦИЯ НЕ ДОБАВЛЯЕТ ВЫЗДОРОВЕВШИХ
    drawGrid();
    updateStats();
    historyData = [];
    if (chart) {
        chart.data.labels = [];
        chart.data.datasets.forEach(ds => ds.data = []);
        chart.update();
    }
}

function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            let color;
            switch(grid[i][j]) {
                case STATES.HEALTHY: color = COLORS.HEALTHY; break;
                case STATES.INFECTED: color = COLORS.INFECTED; break;
                case STATES.RECOVERED: color = COLORS.RECOVERED; break;
                case STATES.DEAD: color = COLORS.DEAD; break;
                default: color = '#fff';
            }
            ctx.fillStyle = color;
            ctx.fillRect(j * cellSize, i * cellSize, cellSize-1, cellSize-1);
        }
    }
}

function updateStats() {
    let healthy = 0, infected = 0, recovered = 0, dead = 0;
    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            switch(grid[i][j]) {
                case STATES.HEALTHY: healthy++; break;
                case STATES.INFECTED: infected++; break;
                case STATES.RECOVERED: recovered++; break;
                case STATES.DEAD: dead++; break;
            }
        }
    }
    document.getElementById('healthyCount').innerText = healthy;
    document.getElementById('infectedCount').innerText = infected;
    document.getElementById('recoveredCount').innerText = recovered;
    document.getElementById('deadCount').innerText = dead;
    
    historyData.push({ healthy, infected, recovered, dead, time: historyData.length + 1 });
    updateChart(healthy, infected, recovered, dead);
}

// ==================== SIMULATION STEP ====================
function updateSimulation() {
    const newGrid = JSON.parse(JSON.stringify(grid));
    let baseInfectionRate = parseFloat(document.getElementById('speed').value);
    const quarantine = document.getElementById('quarantine').checked;
    let infectionRate = quarantine ? baseInfectionRate * 0.5 : baseInfectionRate;
    const mortalityRate = parseFloat(document.getElementById('mortality').value) / 100;

    for (let i = 0; i < rows; i++) {
        for (let j = 0; j < cols; j++) {
            if (grid[i][j] === STATES.INFECTED) {
                if (Math.random() < mortalityRate) {
                    newGrid[i][j] = STATES.DEAD;
                    continue;
                }
                for (let di = -1; di <= 1; di++) {
                    for (let dj = -1; dj <= 1; dj++) {
                        if (di === 0 && dj === 0) continue;
                        const ni = i + di;
                        const nj = j + dj;
                        if (ni >= 0 && ni < rows && nj >= 0 && nj < cols) {
                            if (grid[ni][nj] === STATES.HEALTHY && Math.random() < infectionRate) {
                                newGrid[ni][nj] = STATES.INFECTED;
                            }
                        }
                    }
                }
                if (Math.random() < 0.1) {
                    newGrid[i][j] = STATES.RECOVERED;
                }
            }
        }
    }
    grid = newGrid;
    drawGrid();
    updateStats();
}

// ==================== CSV EXPORT ====================
function exportCSV() {
    if (historyData.length === 0) {
        alert("{{ t.no_data_alert }}");
        return;
    }
    let csv = "Time,Healthy,Infected,Recovered,Dead\n";
    historyData.forEach(row => {
        csv += `${row.time},${row.healthy},${row.infected},${row.recovered},${row.dead}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'simulation_data.csv';
    a.click();
    URL.revokeObjectURL(url);
}

// ==================== CONTROL FUNCTIONS ====================
window.startSimulation = function() {
    if (isRunning) return;
    isRunning = true;
    simulationInterval = setInterval(updateSimulation, 200);
};
window.stopSimulation = function() {
    if (simulationInterval) {
        clearInterval(simulationInterval);
        simulationInterval = null;
    }
    isRunning = false;
};
window.resetSimulation = function() {
    stopSimulation();
    initGrid();
};

// ==================== START ====================
initChart();
initGrid();
</script>
{% endblock %}
