<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Համաշխարհային քարտեզ - Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0a192f; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 10px; z-index: 1000; }
    </style>
</head>
<body>
    <div class="info">
        <h3>🌍 Վիրուսային բռնկումներ</h3>
        <p>Մարկերները ցույց են տալիս ակտիվ բռնկումները</p>
    </div>
    <div id="map"></div>

    <script>
    // Create map
    var map = L.map('map').setView([20, 0], 2);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    
    // Test marker
    var marker = L.marker([40.18, 44.51]).addTo(map);
    marker.bindPopup("<b>Երևան, Հայաստան</b><br>Վիրուս: COVID-19<br>Դեպքեր: 2345<br>Մահեր: 67").openPopup();
    
    // Add more markers
    var markers = [
        { lat: 51.51, lon: -0.13, name: "Լոնդոն, ՄԲ", virus: "COVID-19", cases: 2345, deaths: 45, risk: "medium" },
        { lat: 48.86, lon: 2.35, name: "Փարիզ, Ֆրանսիա", virus: "H3N2", cases: 5600, deaths: 230, risk: "medium" },
        { lat: 52.52, lon: 13.40, name: "Բեռլին, Գերմանիա", virus: "COVID-19", cases: 3456, deaths: 67, risk: "medium" },
        { lat: 41.90, lon: 12.50, name: "Հռոմ, Իտալիա", virus: "COVID-19", cases: 2345, deaths: 89, risk: "medium" },
        { lat: 40.42, lon: -3.70, name: "Մադրիդ, Իսպանիա", virus: "COVID-19", cases: 4567, deaths: 156, risk: "medium" },
        { lat: 55.76, lon: 37.62, name: "Մոսկվա, Ռուսաստան", virus: "COVID-19", cases: 7890, deaths: 345, risk: "high" },
        { lat: 40.71, lon: -74.01, name: "Նյու Յորք, ԱՄՆ", virus: "COVID-19", cases: 23456, deaths: 345, risk: "high" },
        { lat: 34.05, lon: -118.24, name: "Լոս Անջելես, ԱՄՆ", virus: "H5N1", cases: 1240, deaths: 145, risk: "medium" },
        { lat: -23.55, lon: -46.63, name: "Սան Պաուլո, Բրազիլիա", virus: "Դենգե", cases: 12500, deaths: 430, risk: "high" },
        { lat: -33.87, lon: 151.21, name: "Սիդնեյ, Ավստրալիա", virus: "COVID-19", cases: 2345, deaths: 45, risk: "medium" },
        { lat: 35.86, lon: 104.19, name: "Պեկին, Չինաստան", virus: "COVID-19", cases: 4500, deaths: 89, risk: "medium" },
        { lat: 28.61, lon: 77.23, name: "Նյու Դելի, Հնդկաստան", virus: "COVID-19", cases: 2345, deaths: 67, risk: "medium" },
        { lat: 1.35, lon: 103.82, name: "Սինգապուր", virus: "COVID-19", cases: 890, deaths: 4, risk: "low" },
        { lat: 25.07, lon: 55.31, name: "Դուբայ, ԱՄԷ", virus: "COVID-19", cases: 5678, deaths: 89, risk: "medium" },
        { lat: -4.44, lon: 15.27, name: "Կինշասա, Կոնգո", virus: "Էբոլա", cases: 312, deaths: 187, risk: "high" },
        { lat: -26.20, lon: 28.04, name: "Յոհանեսբուրգ, ՀԱՀ", virus: "COVID-19", cases: 1250, deaths: 45, risk: "medium" },
        { lat: 19.43, lon: -99.13, name: "Մեխիկո, Մեքսիկա", virus: "COVID-19", cases: 7890, deaths: 567, risk: "high" }
    ];
    
    function getColor(risk) {
        if (risk === 'high') return '#ff4444';
        if (risk === 'medium') return '#ff8c44';
        return '#4caf50';
    }
    
    markers.forEach(function(item) {
        var radius = Math.sqrt(item.cases) / 6 + 4;
        radius = Math.min(radius, 25);
        
        var circle = L.circleMarker([item.lat, item.lon], {
            radius: radius,
            color: '#fff',
            weight: 1.5,
            fillColor: getColor(item.risk),
            fillOpacity: 0.8
        }).addTo(map);
        
        var riskText = item.risk === 'high' ? '🔴 Բարձր' : (item.risk === 'medium' ? '🟠 Միջին' : '🟢 Ցածր');
        
        circle.bindPopup(`
            <div style="min-width:200px;">
                <h4 style="margin:0 0 5px; color: #2cc3ff;">${item.name}</h4>
                <p style="margin:2px 0;"><b>Վիրուս:</b> ${item.virus}</p>
                <p style="margin:2px 0;"><b>Դեպքեր:</b> ${item.cases.toLocaleString()}</p>
                <p style="margin:2px 0;"><b>Մահեր:</b> ${item.deaths.toLocaleString()}</p>
                <p style="margin:2px 0;"><b>Ռիսկ:</b> ${riskText}</p>
            </div>
        `);
    });
    
    console.log("Map loaded with " + (markers.length + 1) + " markers");
    </script>
</body>
</html>
