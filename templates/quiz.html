{% extends "base.html" %}
{% block title %}{{ t.quiz_title }} - {{ level_name }}{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ t.quiz_title }} — {{ level_name }}</h2>
    <form id="quizForm">
        {% for q in questions %}
        <div class="quiz-question">
            <p><strong>{{ loop.index }}. {{ q.question }}</strong></p>
            {% for opt in q.options %}
            <label>
                <input type="radio" name="q{{ loop.index0 }}" value="{{ loop.index0 }}">
                {{ opt }}
            </label><br>
            {% endfor %}
        </div>
        {% endfor %}
        <div class="quiz-buttons">
            <button type="button" onclick="submitQuiz()" class="btn-primary">{{ t.submit }}</button>
            <button type="button" onclick="resetQuiz()" class="btn-secondary">{{ t.reset }}</button>
        </div>
    </form>
    <div id="quiz-result"></div>
</div>

<script>
function submitQuiz() {
    const form = document.getElementById('quizForm');
    let score = 0;
    const total = {{ total }};
    {% for q in questions %}
    const selected = form.querySelector('input[name="q{{ loop.index0 }}"]:checked');
    if (selected && parseInt(selected.value) === {{ q.correct }}) {
        score++;
    }
    {% endfor %}
    const percent = Math.round((score / total) * 100);
    const name = prompt("{{ t.your_name }}", "Guest");
    if (name) {
        fetch('/save_score', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name,
                level: '{{ level }}',
                score: score,
                total: total,
                percent: percent
            })
        }).then(() => {
            window.location.href = '/leaderboard';
        });
    } else {
        document.getElementById('quiz-result').innerHTML = `<div class="result">Ձեր արդյունքը: ${score}/${total} (${percent}%)</div>`;
    }
}
function resetQuiz() {
    document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
}
</script>
{% endblock %}
