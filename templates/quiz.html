{% extends "base.html" %}
{% block title %}{{ t.quiz_title }} - {{ level_name }}{% endblock %}

{% block content %}
<div class="card">
    <h2 style="text-align: center;">{{ t.quiz_title }} — {{ level_name }}</h2>
    <div id="quiz-container" style="background: rgba(6,20,45,0.6); border-radius: 20px; padding: 25px; margin: 20px 0;">
        <div id="question-number" style="color: #2cc3ff; margin-bottom: 15px; font-weight: bold;"></div>
        <div id="question-text" style="font-size: 1.3rem; margin-bottom: 30px;"></div>
        <div id="options-container"></div>
        <div style="display: flex; justify-content: space-between; margin-top: 30px;">
            <button id="prev-btn" class="quiz-nav-btn" style="background: rgba(44,195,255,0.2); color: white; padding: 10px 25px; border: 1px solid #2cc3ff; border-radius: 40px; cursor: pointer; transition: 0.3s;">{{ t.prev|default('◀ Նախորդ') }}</button>
            <button id="next-btn" class="quiz-nav-btn" style="background: linear-gradient(135deg, #2cc3ff, #1a9fd0); color: #0a192f; padding: 10px 25px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.3s;">{{ t.next|default('Հաջորդ ▶') }}</button>
        </div>
        <div id="quiz-result" style="margin-top: 20px; text-align: center; font-size: 1.1rem;"></div>
    </div>
</div>

<script>
// ===== QUIZ DATA =====
const questions = [
    {% for q in questions %}
    {
        text: "{{ q.question|safe }}",
        options: [
            {% for opt in q.options %}
            "{{ opt|safe }}"{% if not loop.last %},{% endif %}
            {% endfor %}
        ],
        correct: {{ q.correct }}
    }{% if not loop.last %},{% endif %}
    {% endfor %}
];
const total = {{ total }};
let current = 0;
let answers = new Array(total).fill(null);

// ===== DOM ELEMENTS =====
const questionNumberDiv = document.getElementById('question-number');
const questionTextDiv = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const resultDiv = document.getElementById('quiz-result');

// ===== LOAD CURRENT QUESTION =====
function loadQuestion() {
    const q = questions[current];
    questionNumberDiv.innerText = `{{ t.question }} ${current+1} / ${total}`;
    questionTextDiv.innerText = q.text;
    
    let optionsHtml = '';
    q.options.forEach((opt, idx) => {
        const checked = answers[current] === idx ? 'checked' : '';
        optionsHtml += `
            <label style="display: block; margin: 15px 0; cursor: pointer; padding: 12px 15px; border-radius: 15px; background: rgba(44,195,255,0.05); transition: 0.2s;">
                <input type="radio" name="option" value="${idx}" ${checked} style="margin-right: 12px; transform: scale(1.1);">
                <span style="font-size: 1rem;">${opt}</span>
            </label>
        `;
    });
    optionsContainer.innerHTML = optionsHtml;
    
    // Attach event listeners to radio buttons
    document.querySelectorAll('input[name="option"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            answers[current] = parseInt(e.target.value);
        });
    });
    
    // Update button states
    prevBtn.style.opacity = current === 0 ? '0.5' : '1';
    prevBtn.style.pointerEvents = current === 0 ? 'none' : 'auto';
    
    if (current === total - 1) {
        nextBtn.innerText = '{{ t.finish|default("✔ Ավարտել") }}';
    } else {
        nextBtn.innerText = '{{ t.next|default("Հաջորդ ▶") }}';
    }
}

// ===== NEXT BUTTON =====
function nextQuestion() {
    // Save current answer if selected
    const selected = document.querySelector('input[name="option"]:checked');
    if (selected) {
        answers[current] = parseInt(selected.value);
    }
    
    if (current === total - 1) {
        // Finish quiz
        finishQuiz();
    } else {
        current++;
        loadQuestion();
    }
}

// ===== PREVIOUS BUTTON =====
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

// ===== FINISH QUIZ =====
function finishQuiz() {
    let score = 0;
    for (let i = 0; i < total; i++) {
        if (answers[i] !== null && answers[i] === questions[i].correct) {
            score++;
        }
    }
    const percent = Math.round((score / total) * 100);
    const name = prompt("{{ t.your_name }}", "Guest");
    if (name && name.trim()) {
        fetch('/save_score', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name.trim(),
                level: '{{ level }}',
                score: score,
                total: total,
                percent: percent
            })
        }).then(() => {
            window.location.href = '/leaderboard';
        }).catch(() => {
            resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
            nextBtn.disabled = true;
            prevBtn.disabled = true;
        });
    } else {
        resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
        nextBtn.disabled = true;
        prevBtn.disabled = true;
    }
}

// ===== EVENT LISTENERS =====
prevBtn.addEventListener('click', prevQuestion);
nextBtn.addEventListener('click', nextQuestion);

// ===== INIT =====
loadQuestion();
</script>
{% endblock %}
