{% extends "base.html" %}
{% block title %}{{ t.quiz_title }} - {{ level_name[currentLang] }}{% endblock %}

{% block content %}
<div class="card">
    <h2 style="text-align: center;">{{ t.quiz_title }} — {{ level_name[currentLang] }}</h2>
    
    <div id="quiz-container" style="background: rgba(6,20,45,0.6); border-radius: 20px; padding: 30px; margin: 20px 0;">
        <div id="question-number" style="color: #2cc3ff; margin-bottom: 15px; font-weight: bold; text-align: center;"></div>
        <div id="question-text" style="font-size: 1.4rem; margin-bottom: 35px; text-align: center; line-height: 1.4; color: white;"></div>
        <div id="options-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 35px;"></div>
        <div id="quiz-result" style="margin-top: 25px; text-align: center; font-size: 1.1rem; color: white;"></div>
    </div>
</div>

<!-- MODAL WINDOW -->
<div id="nameModal" class="modal">
    <div class="modal-content">
        <h3>{{ t.your_name }}</h3>
        <input type="text" id="playerName" placeholder="{{ t.your_name }}" autocomplete="off">
        <div class="modal-buttons">
            <button class="btn-cancel" id="modalCancel">{{ t.cancel|default('Չեղարկել') }}</button>
            <button class="btn-ok" id="modalOk">{{ t.ok|default('Շարունակել') }}</button>
        </div>
    </div>
</div>

<style>
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 10001;
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #0a192f;
    border: 2px solid #2cc3ff;
    border-radius: 24px;
    padding: 30px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    animation: fadeInUp 0.3s ease;
}
.modal-content input {
    width: 100%;
    padding: 12px 15px;
    margin: 20px 0;
    background: #1e2f4a;
    border: 1px solid #2cc3ff;
    border-radius: 40px;
    color: white;
}
.modal-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}
.modal-buttons button {
    padding: 10px 25px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
}
.modal-buttons .btn-ok {
    background: linear-gradient(135deg, #2cc3ff, #1a9fd0);
    border: none;
    color: #0a192f;
}
.modal-buttons .btn-cancel {
    background: transparent;
    border: 1px solid #2cc3ff;
    color: white;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentLang = '{{ lang }}';
    const allQuestions = {{ questions | tojson }};
    
    if (!allQuestions || typeof allQuestions !== 'object') {
        const errorDiv = document.getElementById('question-text');
        if (errorDiv) errorDiv.innerText = '⚠️ Տվյալների բազայի սխալ: allQuestions is missing.';
        return;
    }
    
    const questions = allQuestions[currentLang];
    if (!questions || !Array.isArray(questions) || questions.length === 0) {
        const errorDiv = document.getElementById('question-text');
        if (errorDiv) errorDiv.innerText = '⚠️ Տվյալների բազայի սխալ: questions not found for language ' + currentLang;
        return;
    }
    
    const total = questions.length;
    let current = 0;
    let answers = new Array(total).fill(null);
    let waitingForNext = false;
    
    const questionNumberDiv = document.getElementById('question-number');
    const questionTextDiv = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const resultDiv = document.getElementById('quiz-result');
    
    function disableButtons(disabled) {
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = disabled;
        });
    }
    
    function showAnswerFeedback(selectedIdx) {
        const q = questions[current];
        const allButtons = document.querySelectorAll('.option-btn');
        // Reset all buttons to default style
        allButtons.forEach((btn, idx) => {
            btn.style.background = 'rgba(44,195,255,0.1)';
            btn.style.color = 'white';
            btn.style.border = '2px solid #2cc3ff';
            // Highlight correct answer in green
            if (idx === q.correct) {
                btn.style.background = '#28a745';
                btn.style.border = '2px solid #28a745';
                btn.style.color = 'white';
            }
            // Highlight selected wrong answer in red
            if (idx === selectedIdx && idx !== q.correct) {
                btn.style.background = '#dc3545';
                btn.style.border = '2px solid #dc3545';
                btn.style.color = 'white';
            }
        });
    }
    
    function createOptionButtons() {
        const q = questions[current];
        if (!q) return [];
        const buttons = [];
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.textContent = opt;
            btn.className = 'option-btn';
            btn.style.background = 'rgba(44,195,255,0.1)';
            btn.style.border = '2px solid #2cc3ff';
            btn.style.borderRadius = '50px';
            btn.style.padding = '8px 12px';  // փոքրացրած
            btn.style.fontSize = '0.9rem';    // փոքրացրած
            btn.style.fontWeight = 'bold';
            btn.style.color = 'white';
            btn.style.cursor = 'pointer';
            btn.style.transition = 'all 0.2s';
            btn.style.width = '100%';
            
            btn.addEventListener('click', () => {
                if (waitingForNext) return;
                if (answers[current] !== null) return;
                
                answers[current] = idx;
                waitingForNext = true;
                
                showAnswerFeedback(idx);
                disableButtons(true);
                
                // Auto move to next question after 1 second
                setTimeout(() => {
                    if (current + 1 < total) {
                        current++;
                        loadQuestion();
                        waitingForNext = false;
                        disableButtons(false);
                    } else {
                        // Quiz finished
                        finishQuiz();
                    }
                }, 1000);
            });
            buttons.push(btn);
        });
        return buttons;
    }
    
    function loadQuestion() {
        const q = questions[current];
        if (!q) return;
        if (questionNumberDiv) questionNumberDiv.innerText = `{{ t.question }} ${current+1} / ${total}`;
        if (questionTextDiv) questionTextDiv.innerText = q.question;
        if (optionsContainer) {
            optionsContainer.innerHTML = '';
            createOptionButtons().forEach(btn => optionsContainer.appendChild(btn));
        }
        if (resultDiv) resultDiv.innerHTML = '';
        waitingForNext = false;
    }
    
    function finishQuiz() {
        let score = 0;
        for (let i = 0; i < total; i++) {
            if (answers[i] !== null && answers[i] === questions[i].correct) score++;
        }
        const percent = Math.round((score / total) * 100);
        const modal = document.getElementById('nameModal');
        const nameInput = document.getElementById('playerName');
        const okBtn = document.getElementById('modalOk');
        const cancelBtn = document.getElementById('modalCancel');
        
        if (modal) modal.style.display = 'flex';
        if (nameInput) {
            nameInput.value = '';
            nameInput.focus();
        }
        
        const submitScore = (name) => {
            if (modal) modal.style.display = 'none';
            if (name && name.trim()) {
                fetch('/save_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name.trim(), level: '{{ level }}', score: score, total: total, percent: percent })
                }).then(() => { window.location.href = '/leaderboard'; })
                  .catch(() => {
                      if (resultDiv) resultDiv.innerHTML = `<div style="padding:15px;background:rgba(44,195,255,0.2);border-radius:20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
                  });
            } else {
                if (resultDiv) resultDiv.innerHTML = `<div style="padding:15px;background:rgba(44,195,255,0.2);border-radius:20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
            }
        };
        
        const okHandler = () => submitScore(nameInput ? nameInput.value : '');
        const cancelHandler = () => submitScore('');
        const enterHandler = (e) => { if (e.key === 'Enter') { e.preventDefault(); okHandler(); } };
        
        if (okBtn) {
            okBtn.removeEventListener('click', okHandler);
            okBtn.addEventListener('click', okHandler);
        }
        if (cancelBtn) {
            cancelBtn.removeEventListener('click', cancelHandler);
            cancelBtn.addEventListener('click', cancelHandler);
        }
        if (nameInput) {
            nameInput.removeEventListener('keypress', enterHandler);
            nameInput.addEventListener('keypress', enterHandler);
        }
    }
    
    loadQuestion();
});
</script>
{% endblock %}
