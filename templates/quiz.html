{% extends "base.html" %}
{% block title %}{{ t.quiz_title }} - {{ level_name }}{% endblock %}

{% block content %}
<div class="card">
    <h2 style="text-align: center;">{{ t.quiz_title }} — {{ level_name }}</h2>
    
    <div id="quiz-container" style="background: rgba(6,20,45,0.6); border-radius: 20px; padding: 30px; margin: 20px 0;">
        <div id="question-number" style="color: #2cc3ff; margin-bottom: 15px; font-weight: bold; text-align: center;"></div>
        <div id="question-text" style="font-size: 1.4rem; margin-bottom: 35px; text-align: center; line-height: 1.4;"></div>
        
        <div id="options-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 35px;"></div>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
            <button id="prev-btn" class="quiz-nav-btn" style="background: rgba(44,195,255,0.2); color: white; padding: 12px 30px; border: 1px solid #2cc3ff; border-radius: 50px; font-size: 1rem; cursor: pointer; transition: all 0.3s;">◀ {{ t.prev|default('Նախորդ') }}</button>
            <button id="next-btn" class="quiz-nav-btn" style="background: linear-gradient(135deg, #2cc3ff, #1a9fd0); color: #0a192f; padding: 12px 30px; border: none; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.3s;">{{ t.next|default('Հաջորդ') }} ▶</button>
        </div>
        
        <div id="quiz-result" style="margin-top: 25px; text-align: center; font-size: 1.1rem;"></div>
    </div>
</div>

<!-- MODAL WINDOW -->
<div id="nameModal" class="modal">
    <div class="modal-content">
        <h3>{{ t.your_name }}</h3>
        <input type="text" id="playerName" placeholder="{{ t.your_name }}" autocomplete="off">
        <div class="modal-buttons">
            <button class="btn-cancel" id="modalCancel">{{ t.cancel|default('Չեղարկել') }}</button>
            <button class="btn-ok" id="modalOk">{{ t.ok|default('Շարունակել') }}</button>
        </div>
    </div>
</div>


<script>
// ===== QUIZ DATA =====
const questions = [
    {% for q in questions %}
    {
        text: "{{ q.question|safe }}",
        options: [
            {% for opt in q.options %}
            "{{ opt|safe }}"{% if not loop.last %},{% endif %}
            {% endfor %}
        ],
        correct: {{ q.correct }}
    }{% if not loop.last %},{% endif %}
    {% endfor %}
];
const total = {{ total }};
let current = 0;
let answers = new Array(total).fill(null);
let selectedOptionIndex = null;

// ===== DOM ELEMENTS =====
const questionNumberDiv = document.getElementById('question-number');
const questionTextDiv = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const resultDiv = document.getElementById('quiz-result');

// ===== FINISH QUIZ =====
function finishQuiz() {
    let score = 0;
    for (let i = 0; i < total; i++) {
        if (answers[i] !== null && answers[i] === questions[i].correct) {
            score++;
        }
    }
    const percent = Math.round((score / total) * 100);
    
    // Show modal instead of prompt
    const modal = document.getElementById('nameModal');
    const nameInput = document.getElementById('playerName');
    modal.style.display = 'flex';
    nameInput.value = '';
    nameInput.focus();
    
    // Resolve promise style
    let resolved = false;
    const submitScore = (name) => {
        if (resolved) return;
        resolved = true;
        modal.style.display = 'none';
        if (name && name.trim()) {
            fetch('/save_score', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name.trim(),
                    level: '{{ level }}',
                    score: score,
                    total: total,
                    percent: percent
                })
            }).then(() => {
                window.location.href = '/leaderboard';
            }).catch(() => {
                resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
                nextBtn.disabled = true;
                prevBtn.disabled = true;
            });
        } else {
            resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
            nextBtn.disabled = true;
            prevBtn.disabled = true;
        }
    };
    
    // Handle OK button
    const okBtn = document.getElementById('modalOk');
    const cancelBtn = document.getElementById('modalCancel');
    const handleEnter = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitScore(nameInput.value);
        }
    };
    const okHandler = () => submitScore(nameInput.value);
    const cancelHandler = () => submitScore('');
    
    okBtn.addEventListener('click', okHandler);
    cancelBtn.addEventListener('click', cancelHandler);
    nameInput.addEventListener('keypress', handleEnter);
    
    // Clean up event listeners after modal closes (optional, but prevents multiple)
    const cleanup = () => {
        okBtn.removeEventListener('click', okHandler);
        cancelBtn.removeEventListener('click', cancelHandler);
        nameInput.removeEventListener('keypress', handleEnter);
    };
    // We'll call cleanup after submitScore is called (inside it)
    // We'll override submitScore to call cleanup
    const originalSubmit = submitScore;
    window.submitScoreWrapper = (name) => {
        cleanup();
        originalSubmit(name);
    };
    // Fix the handlers to use wrapper
    okBtn.onclick = () => window.submitScoreWrapper(nameInput.value);
    cancelBtn.onclick = () => window.submitScoreWrapper('');
    nameInput.onkeypress = (e) => {
        if (e.key === 'Enter') window.submitScoreWrapper(nameInput.value);
    };
}
    

// ===== CREATE BUTTONS FOR OPTIONS =====
function createOptionButtons() {
    const q = questions[current];
    const buttons = [];
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.className = 'option-btn';
        btn.setAttribute('data-value', idx);
        btn.style.background = 'rgba(44,195,255,0.1)';
        btn.style.border = '2px solid #2cc3ff';
        btn.style.borderRadius = '50px';
        btn.style.padding = '14px 20px';
        btn.style.fontSize = '1rem';
        btn.style.fontWeight = 'bold';
        btn.style.color = 'white';
        btn.style.cursor = 'pointer';
        btn.style.transition = 'all 0.2s';
        btn.style.textAlign = 'center';
        
        // Highlight if this option was previously selected
        if (answers[current] === idx) {
            btn.style.background = 'linear-gradient(135deg, #2cc3ff, #1a9fd0)';
            btn.style.color = '#0a192f';
            btn.style.boxShadow = '0 0 15px rgba(44,195,255,0.5)';
            selectedOptionIndex = idx;
        }
        
        btn.addEventListener('mouseenter', () => {
            if (answers[current] !== idx) {
                btn.style.background = 'rgba(44,195,255,0.3)';
                btn.style.transform = 'translateY(-2px)';
            }
        });
        btn.addEventListener('mouseleave', () => {
            if (answers[current] !== idx) {
                btn.style.background = 'rgba(44,195,255,0.1)';
                btn.style.transform = 'translateY(0)';
            }
        });
        btn.addEventListener('click', () => {
            // Remove highlight from all buttons
            document.querySelectorAll('.option-btn').forEach(b => {
                b.style.background = 'rgba(44,195,255,0.1)';
                b.style.color = 'white';
                b.style.boxShadow = 'none';
            });
            // Highlight clicked button
            btn.style.background = 'linear-gradient(135deg, #2cc3ff, #1a9fd0)';
            btn.style.color = '#0a192f';
            btn.style.boxShadow = '0 0 15px rgba(44,195,255,0.5)';
            selectedOptionIndex = idx;
            answers[current] = idx;
        });
        buttons.push(btn);
    });
    return buttons;
}

// ===== LOAD CURRENT QUESTION =====
function loadQuestion() {
    const q = questions[current];
    questionNumberDiv.innerText = `{{ t.question }} ${current+1} / ${total}`;
    questionTextDiv.innerText = q.text;
    
    // Clear and recreate buttons
    optionsContainer.innerHTML = '';
    const buttons = createOptionButtons();
    buttons.forEach(btn => optionsContainer.appendChild(btn));
    
    // Update button states
    prevBtn.style.opacity = current === 0 ? '0.5' : '1';
    prevBtn.style.pointerEvents = current === 0 ? 'none' : 'auto';
    
    if (current === total - 1) {
        nextBtn.innerHTML = '✔ {{ t.finish|default("Ավարտել") }}';
    } else {
        nextBtn.innerHTML = '{{ t.next|default("Հաջորդ") }} ▶';
    }
    
    // Hide result if visible
    resultDiv.innerHTML = '';
}

// ===== NEXT BUTTON =====
function nextQuestion() {
    if (current === total - 1) {
        finishQuiz();
    } else {
        // Move to next question
        current++;
        loadQuestion();
    }
}

// ===== PREVIOUS BUTTON =====
function prevQuestion() {
    if (current > 0) {
        current--;
        loadQuestion();
    }
}

// ===== FINISH QUIZ =====
function finishQuiz() {
    let score = 0;
    for (let i = 0; i < total; i++) {
        if (answers[i] !== null && answers[i] === questions[i].correct) {
            score++;
        }
    }
    const percent = Math.round((score / total) * 100);
    const name = prompt("{{ t.your_name }}", "Guest");
    if (name && name.trim()) {
        fetch('/save_score', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: name.trim(),
                level: '{{ level }}',
                score: score,
                total: total,
                percent: percent
            })
        }).then(() => {
            window.location.href = '/leaderboard';
        }).catch(() => {
            resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
            nextBtn.disabled = true;
            prevBtn.disabled = true;
        });
    } else {
        resultDiv.innerHTML = `<div style="padding: 15px; background: rgba(44,195,255,0.2); border-radius: 20px;">{{ t.result }}: ${score}/${total} (${percent}%)</div>`;
        nextBtn.disabled = true;
        prevBtn.disabled = true;
    }
}

// ===== EVENT LISTENERS =====
prevBtn.addEventListener('click', prevQuestion);
nextBtn.addEventListener('click', nextQuestion);

// ===== INIT =====
loadQuestion();
</script>
{% endblock %}
